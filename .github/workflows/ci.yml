name: PR & Branch CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
      - 'stable/**'
  workflow_dispatch:
    inputs:
      spec_ref:
        description: 'Git ref (branch/tag/SHA) in camunda/camunda to fetch spec from'
        required: false
        default: 'main'

env:
  SPEC_REF: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.spec_ref) || vars.SPEC_REF_OVERRIDE || 'main' }}

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    uses: camunda/sdk-infra/.github/workflows/sdk-commitlint.yml@v1

  spec-ref-guard:
    uses: camunda/sdk-infra/.github/workflows/sdk-spec-ref-guard.yml@v1
    with:
      spec-ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.spec_ref) || vars.SPEC_REF_OVERRIDE || 'main' }}
      default-ref: 'main'
      ack: ${{ vars.SPEC_REF_OVERRIDE_ACK || '' }}
      expires: ${{ vars.SPEC_REF_OVERRIDE_EXPIRES || '' }}

  test:
    needs: [spec-ref-guard]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        stack: [simple, full]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch & Bundle spec
        run: bash scripts/bundle-spec.sh

      - name: Generate SDK
        run: dotnet run --project src/Camunda.Orchestration.Sdk.Generator

      - name: Format Generated Code
        run: dotnet format src/Camunda.Orchestration.Sdk/Camunda.Orchestration.Sdk.csproj --no-restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Build Examples
        run: dotnet build docs/examples/Examples.csproj --configuration Release

      - name: Check README Snippets
        run: python3 scripts/sync-readme-snippets.py --check

      - name: Check SDK Example Coverage
        run: node scripts/check-example-coverage.js

      - name: Check Overwrite Completeness
        run: node scripts/check-overwrite-completeness.js

      - name: Check docs links
        run: python3 scripts/generate-docusaurus-md.py --readme-only --validate-links

      - name: Lint Check
        run: dotnet format --verify-no-changes

      - name: Detect Generation Drift (non-blocking)
        id: drift
        run: |
          if ! git diff --quiet; then
            echo 'drift=true' >> $GITHUB_OUTPUT
            echo 'Generation produced changes (reporting only).' >&2
            git diff --name-only | sed 's/^/CHANGED: /'
            git diff > _gen-drift.patch || true
          else
            echo 'drift=false' >> $GITHUB_OUTPUT
          fi

      - name: Upload Drift Patch
        if: steps.drift.outputs.drift == 'true' && matrix.stack == 'simple'
        uses: actions/upload-artifact@v7
        with:
          name: generation-drift
          path: _gen-drift.patch

      - name: Unit Tests
        run: dotnet test test/Camunda.Orchestration.Sdk.Tests --configuration Release --no-build --verbosity normal

      - name: Start Integration Stack
        uses: camunda/sdk-infra/actions/start-camunda@v1
        with:
          stack: ${{ matrix.stack }}
          docker-dir: docker

      - name: Integration Tests
        run: dotnet test test/Camunda.Orchestration.Sdk.IntegrationTests --configuration Release --no-build --verbosity normal

      - name: Stop Integration Stack
        if: always()
        uses: camunda/sdk-infra/actions/stop-camunda@v1
        with:
          stack: ${{ matrix.stack }}
          docker-dir: docker
          artifact-name: integration-docker-logs-${{ matrix.stack }}

      - name: Append Job Summary
        if: always()
        run: |
          status="${{ job.status }}"
          driftFlag="${{ steps.drift.outputs.drift }}"
          {
            echo "### .NET 8+10 (${{ matrix.stack }}) Summary";
            echo "- Status: ${status}";
            echo "- Spec ref: ${SPEC_REF}";
            if [ "${driftFlag}" = "true" ]; then
              echo "- Generation Drift: detected";
            else
              echo "- Generation Drift: none";
            fi
            echo "";
          } >> $GITHUB_STEP_SUMMARY
